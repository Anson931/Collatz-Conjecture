<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式克拉茲猜想說明圖表</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header-row">
        <h2>互動式克拉茲猜想 (Collatz Conjecture) 說明圖表</h2>
        <button id="themeToggle" class="theme-toggle-btn" aria-label="切換主題">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
    </div>
    <div class="subtitle">
        輸入一個正整數 (n) 並開始運算：(1) 若 n 偶數 &rarr; n/2 ; (2) 若 n 奇數 &rarr; 3n + 1。猜想最終所有數都達到 1。
    </div>

    <div class="panels-grid">
        <div class="panel">
            <div class="form-group">
                <label for="startInput">起始正整數 (n):</label>
                <input type="number" id="startInput" class="input-control" value="7" min="1" step="1">
            </div>
            <div class="btn-group">
                <button id="btnCalc" class="btn btn-primary">開始運算</button>
                <button id="btnReset" class="btn btn-secondary">重置</button>
            </div>
            <div class="status-box">
                <span style="font-weight:bold; margin-right:8px; font-size:14px;">目前運算狀態:</span>
                <div id="statusOutput" class="display-field" style="flex-grow:1;">已完成 (n=7)</div>
            </div>
        </div>

        <div class="panel">
            <div id="infoTitle" style="font-weight: bold; margin-bottom: 12px; font-size: 15px;">序列資訊 (n=7)</div>
            
            <div class="info-inline-group">
                <div class="info-inline-item">
                    <label>起始數:</label>
                    <div id="infoStart" class="display-field">n = 7</div>
                </div>
                <div class="info-inline-item">
                    <label>序列長度 (步驟):</label>
                    <div id="infoLength" class="display-field">17</div>
                </div>
                <div class="info-inline-item">
                    <label>最大值:</label>
                    <div id="infoMax" class="display-field">52</div>
                </div>
            </div>

            <div class="sequence-box">
                <div class="sequence-header-row">
                    <label id="seqLabel" style="font-size: 14px; font-weight: bold;">完整序列 (n=7):</label>
                    <span id="successBadge" class="badge-success">最終達到 1!</span>
                </div>
                <div id="infoSequence" class="display-field" style="word-break: break-all; max-height: 65px; overflow-y: auto; line-height: 1.4;">
                    7, 22, 11, 34, 17, 52, 26, 13, 40, 20, 10, 5, 16, 8, 4, 2, 1
                </div>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-title">n 的值隨步驟變化 (Collatz Sequence)</div>
        <canvas id="collatzChart" style="max-height: 400px; width: 100%;"></canvas>
    </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
